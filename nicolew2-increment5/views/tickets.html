<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Work+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="../static/style.css">
  <script src="../static/script.js" defer></script>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="author" content="Nicole W">
  <meta name="keywords" content="Museum, Carnegie Mellon University, Information Systems">
  <meta name="description" content="MonoMuse website redesign project">
  <title>MonoMuse - Tickets</title>
</head>
<body onload="addYear(); greetingFunc();">
  <div class="container">

    <header class="header">
      <img id="logo" src="../static/monomuselogo.svg" alt="MonoMuse Museum Logo">
      <nav class="nav_bar" id="mainNav">
        <a href="../index.html">Home</a>
        <a href="explore.html">Explore</a>
        <a href="exhibitions.html">Exhibitions</a>
        <a href="buytickets.html">Buy Tickets</a>
        <a href="checkout.html">Checkout</a>
        <a href="javascript:void(0);" class="hamburger-icon" onclick="toggleNav()">&#9776;</a>
      </nav>
    </header>

    <main class="main">
      <h1>Tickets</h1>

      <section>
        <h2>Ticket Prices</h2>
        <table>
          <thead>
            <tr>
              <th>Ticket Type</th>
              <th>Description</th>
              <th>Price</th>
            </tr>
          </thead>
          <tbody>
            <tr>
              <td>General</td>
              <td>General admission for ages 18 and over. Under 18 free of charge.</td>
              <td>$18</td>
            </tr>
            <tr>
              <td>Student</td>
              <td>Valid student ID required.</td>
              <td>$10</td>
            </tr>
            <tr>
              <td>Member</td>
              <td>Museum member ID required.</td>
              <td>$15</td>
            </tr>
          </tbody>
        </table>
      </section>
    </main>

    <footer class="footer">
      <p id="copyYear"></p>
    </footer>

  </div>
